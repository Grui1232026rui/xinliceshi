<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静心心理测评中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="p-4 md:p-10 bg-slate-50">

<div id="app" class="max-w-2xl mx-auto">
    <header class="text-center mb-10">
        <h1 class="text-3xl font-bold text-slate-800">静心心理空间</h1>
        <p class="text-slate-500 mt-2">基于专业心理学模型的深度自我探索</p>
    </header>

    <main class="bg-white rounded-3xl shadow-xl p-8" v-if="!showResult">
        <div class="mb-6">
            <span class="text-sm font-semibold text-blue-500 tracking-widest uppercase">题目 {{currentIndex + 1}} / {{questions.length}}</span>
            <div class="w-full bg-gray-200 h-2 rounded-full mt-2">
                <div class="bg-blue-500 h-2 rounded-full transition-all" :style="{width: ((currentIndex + 1) / questions.length) * 100 + '%'}"></div>
            </div>
        </div>

        <h2 class="text-xl font-medium text-slate-800 mb-8">{{ questions[currentIndex].text }}</h2>

        <div class="space-y-4">
            <button v-for="opt in options" @click="selectOption(opt.score)"
                    class="w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-blue-400 hover:bg-blue-50 transition-all">
                {{ opt.label }}
            </button>
        </div>
    </main>

    <div v-else class="bg-white rounded-3xl shadow-xl p-8 text-center">
        <h2 class="text-2xl font-bold text-slate-800 mb-4">测评报告</h2>
        <p class="text-lg text-slate-600 mb-6 leading-relaxed">{{ finalReport }}</p>
        <p class="text-sm text-green-600 mb-6 font-bold" v-if="uploadSuccess">✅ 测试结果已安全保存至云端</p>
        <button @click="reset" class="px-8 py-3 bg-slate-800 text-white rounded-full">重新测试</button>
    </div>
</div>

<script>
    // 这里的变量名改成了 myAppDatabase，彻底避开冲突
    const s_url = 'https://tuwamrzjrflwrnqwqbof.supabase.co'; 
    const s_key = 'sb_publishable_pZkmGAvPuJ_aHcrg1DVdSA_6TtZx0bv';
    const myAppDatabase = window.supabase.createClient(s_url, s_key);

    Vue.createApp({
        data() {
            return {
                currentIndex: 0,
                totalScore: 0,
                showResult: false,
                uploadSuccess: false,
                questions: [
                    { text: "1. 我觉得自己是一个有价值的人。" },
                    { text: "2. 在公共场合讲话时，我会感到紧张。" },
                    { text: "3. 我倾向于认为自己是一个失败者。" },
                    { text: "4. 我感到大家都在注视我。" },
                    { text: "5. 我能把事情做得一样好。" },
                    { text: "6. 我常在社交场合保持沉默。" },
                    { text: "7. 我对自己持有一种肯定的态度。" },
                    { text: "8. 我很难自然地表达内心感受。" },
                    { text: "9. 总的来说，我对自己是很满意的。" },
                    { text: "10. 面对挑战时，我第一反应是“我不行”。" }
                ],
                options: [
                    { label: "非常符合", score: 5 },
                    { label: "比较符合", score: 4 },
                    { label: "一般", score: 3 },
                    { label: "不太符合", score: 2 },
                    { label: "完全不符合", score: 1 }
                ]
            }
        },
        computed: {
            finalReport() {
                if (this.totalScore >= 35) return "心理状态非常健康。";
                if (this.totalScore >= 20) return "心理状态平稳。";
                return "建议关注心理健康。";
            }
        },
        methods: {
            selectOption(score) {
                this.totalScore += score;
                if (this.currentIndex < this.questions.length - 1) {
                    this.currentIndex++;
                } else {
                    this.showResult = true;
                    this.saveData();
                }
            },
            async saveData() {
                const { error } = await myAppDatabase
                    .from('test_results')
                    .insert([{ username: '访客', total_score: this.totalScore }]);
                if (!error) this.uploadSuccess = true;
            },
            reset() {
                this.currentIndex = 0;
                this.totalScore = 0;
                this.showResult = false;
                this.uploadSuccess = false;
            }
        }
    }).mount('#app');
</script>
</body>
</html>
