<script>
    const supabaseUrl = 'https://tuwamrzjrflwrnqwqbof.supabase.co'; 
    const supabaseKey = 'sb_publishable_pZkmGAvPuJ_aHcrg1DVdSA_6TtZx0bv';

    // 这里改成了 supabaseDB，避开了命名冲突
    const supabaseDB = window.supabase.createClient(supabaseUrl, supabaseKey);
    const { createApp } = Vue;

    createApp({
        data() {
            return {
                currentIndex: 0,
                totalScore: 0,
                showResult: false,
                uploadSuccess: false,
                questions: [
                    { text: "1. 我觉得自己是一个有价值的人，至少与其他人在同一水平上。" },
                    { text: "2. 在公共场合讲话时，我会感到异常紧张或心跳加速。" },
                    { text: "3. 我倾向于认为自己是一个失败者。" },
                    { text: "4. 当我进入一个坐满人的房间时，我会感到大家都在注视我。" },
                    { text: "5. 我能像大多数人一样，把事情做得一样好。" },
                    { text: "6. 我常因担心自己说错话而选择在社交场合保持沉默。" },
                    { text: "7. 我对自己持有一种肯定的态度。" },
                    { text: "8. 即使在熟悉的人面前，我也很难自然地表达内心真实感受。" },
                    { text: "9. 总的来说，我对自己是很满意的。" },
                    { text: "10. 面对新的挑战时，我第一反应通常是“我不行”。" }
                ],
                options: [
                    { label: "非常符合", score: 5 },
                    { label: "比较符合", score: 4 },
                    { label: "一般", score: 3 },
                    { label: "不太符合", score: 2 },
                    { label: "完全不符合", score: 1 }
                ]
            }
        },
        computed: {
            currentQuestion() { return this.questions[this.currentIndex]; },
            progress() { return ((this.currentIndex + 1) / this.questions.length) * 100; },
            finalReport() {
                if (this.totalScore >= 35) return "心理状态非常健康。你拥有强大的自我认同感和社交自信。";
                if (this.totalScore >= 20) return "心理状态平稳。偶尔会有自我怀疑或社交焦虑，属于正常范围。";
                return "当前您的心理能量较低。建议尝试多与积极的朋友沟通，必要时寻求专业心理咨询。";
            }
        },
        methods: {
            async selectOption(score) {
                this.totalScore += score;
                if (this.currentIndex < this.questions.length - 1) {
                    this.currentIndex++;
                } else {
                    this.showResult = true;
                    this.saveDataToCloud();
                }
            },
            async saveDataToCloud() {
                // 注意这里也要用 supabaseDB
                const { error } = await supabaseDB
                    .from('test_results')
                    .insert([
                        { 
                            username: '匿名访客', 
                            total_score: this.totalScore, 
                            detail_answers: '完成了10道测评题' 
                        }
                    ]);
                
                if (!error) {
                    this.uploadSuccess = true;
                } else {
                    console.error("上传失败:", error);
                }
            },
            reset() {
                this.currentIndex = 0;
                this.totalScore = 0;
                this.showResult = false;
                this.uploadSuccess = false;
            }
        }
    }).mount('#app')
</script>
