<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职场情境与个人效能测评 - 津巴多心理学实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .option-btn:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-4 md:p-10 text-slate-800">

<div id="app" class="max-w-2xl mx-auto">
    <header class="text-center mb-10">
        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">职场情境效能测评</h1>
        <p class="text-slate-500 mt-2 font-medium">探索情境力量如何塑造你的职场决策</p>
        <div class="mt-4 inline-block px-3 py-1 bg-slate-200 text-slate-600 text-xs rounded-full uppercase tracking-widest">Zimbardo Style Edition</div>
    </header>

    <main class="bg-white rounded-3xl card-shadow overflow-hidden" v-if="!showResult">
        <div class="h-1.5 w-full bg-slate-100">
            <div class="h-full bg-indigo-600 transition-all duration-500" :style="{width: progress + '%'}"></div>
        </div>

        <div class="p-8 md:p-12">
            <div class="mb-8">
                <span class="text-indigo-600 font-bold text-sm uppercase tracking-wider">Question {{currentIndex + 1}} / 10</span>
                <h2 class="text-xl md:text-2xl font-semibold mt-4 leading-snug text-slate-800">
                    {{ currentQuestion.text }}
                </h2>
            </div>

            <div class="space-y-4">
                <button v-for="opt in options" 
                        @click="selectOption(opt.score)"
                        class="option-btn w-full text-left p-5 rounded-2xl border-2 border-slate-50 hover:border-indigo-500 hover:bg-indigo-50 transition-all group">
                    <div class="flex items-center">
                        <div class="w-8 h-8 rounded-full border-2 border-slate-200 flex items-center justify-center mr-4 group-hover:border-indigo-500 group-hover:bg-indigo-500 group-hover:text-white transition-all">
                            {{ opt.index }}
                        </div>
                        <span class="text-lg font-medium">{{ opt.label }}</span>
                    </div>
                </button>
            </div>
        </div>
    </main>

    <div v-else class="bg-white rounded-3xl card-shadow p-10 text-center animate-in fade-in duration-700">
        <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <h2 class="text-2xl font-bold text-slate-900 mb-2">测评分析报告</h2>
        <p class="text-slate-400 mb-8 text-sm">由津巴多职场心理模型驱动生成</p>
        
        <div class="bg-slate-50 rounded-2xl p-6 mb-8 text-left border border-slate-100">
            <p class="text-lg text-slate-700 leading-relaxed italic">
                “{{ finalReport }}”
            </p>
        </div>
        
        <div v-if="uploadSuccess" class="flex items-center justify-center text-green-600 font-bold mb-8 p-3 bg-green-50 rounded-xl">
            <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
            数据已同步至云端研究库
        </div>
        
        <button @click="reset" class="w-full md:w-auto px-12 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all">
            开始新的探索
        </button>
    </div>

    <footer class="mt-12 text-center text-slate-400 text-xs">
        © 2026 基于津巴多斯坦福心理学研究模型
    </footer>
</div>

<script>
    // 数据库连接配置
    const db_url = 'https://tuwamrzjrflwrnqwqbof.supabase.co'; 
    const db_key = 'sb_publishable_pZkmGAvPuJ_aHcrg1DVdSA_6TtZx0bv';
    const myAppDB = window.supabase.createClient(db_url, db_key);

    const { createApp } = Vue;

    createApp({
        data() {
            return {
                currentIndex: 0,
                totalScore: 0,
                showResult: false,
                uploadSuccess: false,
                // 津巴多教授设计的 10 道职场心理题
                questions: [
                    { text: "1. 【权威情境】当上级给出一个明显错误、但语气坚定的指令时，我倾向于保持沉默并执行，而不是当面质疑。" },
                    { text: "2. 【群体压力】在部门会议上，如果绝大多数同事都赞成某个方案，即使我有不同意见，也会选择附和大家。" },
                    { text: "3. 【角色束缚】我感到“员工”这个角色限制了真实的自我表达，我在工作中展现的形象并非真实的我。" },
                    { text: "4. 【时间压力】面对极其不合理、甚至不可能完成的任务截止时间，我的第一反应是感到恐慌，而不是寻找资源解决。" },
                    { text: "5. 【去人性化】在处理客户或下属的问题时，我更倾向于按流程办事，很少去考虑他们个人的情感或特殊遭遇。" },
                    { text: "6. 【责任分散】当项目出现重大失误且责任模糊时，我会下意识地寻找借口或暗示这是团队的整体责任，而不是主动承担。" },
                    { text: "7. 【自我效能】即使身处裁员阴影或行业低谷这种大环境，我依然坚信自己可以通过努力掌控职业命运，而不是坐以待毙。" },
                    { text: "8. 【道德两难】为了达成部门业绩目标或个人晋升，如果需要牺牲一点职业道德（如隐瞒瑕疵），我会感到内心挣扎但最终可能会妥协。" },
                    { text: "9. 【英雄主义】在职场中看到不公正的现象（如排挤同事、欺上瞒下），即使与我无关，我也能挺身而出进行干预。" },
                    { text: "10. 【未来取向】我能为了长远的职业发展目标，而主动放弃当下的安逸或眼前的短期利益。" }
                ],
                options: [
                    { index: "A", label: "非常符合", score: 5 },
                    { index: "B", label: "比较符合", score: 4 },
                    { index: "C", label: "一般", score: 3 },
                    { index: "D", label: "不太符合", score: 2 },
                    { index: "E", label: "完全不符合", score: 1 }
                ]
            }
        },
        computed: {
            currentQuestion() { return this.questions[this.currentIndex]; },
            progress() { return ((this.currentIndex + 1) / this.questions.length) * 100; },
            finalReport() {
                if (this.totalScore >= 40) return "【职场英雄】你拥有极强的自我效能感，不轻易受制于环境压力。你不仅能掌控职业命运，更能成为维护公平的正义力量。";
                if (this.totalScore >= 30) return "【理性实践者】你具备稳健的心理素质，能在大多数情境下保持独立思考。你懂得以目标为导向，适度平衡压力。";
                if (this.totalScore >= 20) return "【情境适应者】你容易受到环境和群体影响，倾向于通过顺从获得安全。建议增强自我认同，尝试在小事上坚持原则。";
                return "【易感人群】你目前的心理能量较低，极易被情境俘获。职场压力可能让你感到无力，建议寻求专业支持以重建自信。";
            }
        },
        methods: {
            async selectOption(score) {
                this.totalScore += score;
                if (this.currentIndex < this.questions.length - 1) {
                    this.currentIndex++;
                } else {
                    this.showResult = true;
                    this.saveData();
                }
            },
            async saveData() {
                const { error } = await myAppDB
                    .from('test_results')
                    .insert([{ 
                        username: '职场访客', 
                        total_score: this.totalScore,
                        detail_answers: '完成津巴多职场压力测评' 
                    }]);
                if (!error) this.uploadSuccess = true;
            },
            reset() {
                this.currentIndex = 0;
                this.totalScore = 0;
                this.showResult = false;
                this.uploadSuccess = false;
            }
        }
    }).mount('#app')
</script>
</body>
</html>
