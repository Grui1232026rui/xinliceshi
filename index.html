<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静心心理测评中心 - 专业人格测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f4f8; font-family: 'PingFang SC', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10">

<div id="app" class="max-w-2xl mx-auto">
    <header class="text-center mb-10">
        <h1 class="text-3xl font-bold text-slate-800">静心心理空间</h1>
        <p class="text-slate-500 mt-2">基于专业心理学模型的深度自我探索</p>
    </header>

    <main class="bg-white rounded-3xl shadow-xl p-8 fade-in" v-if="!showResult">
        <div class="mb-6">
            <span class="text-sm font-semibold text-blue-500 tracking-widest uppercase">题目 {{currentIndex + 1}} / {{questions.length}}</span>
            <div class="w-full bg-gray-200 h-2 rounded-full mt-2">
                <div class="bg-blue-500 h-2 rounded-full transition-all" :style="{width: progress + '%'}"></div>
            </div>
        </div>

        <h2 class="text-xl font-medium text-slate-800 mb-8">{{ currentQuestion.text }}</h2>

        <div class="space-y-4">
            <button v-for="opt in options" 
                    @click="selectOption(opt.score)"
                    class="w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-blue-400 hover:bg-blue-50 transition-all active:scale-95">
                {{ opt.label }}
            </button>
        </div>
    </main>

    <div v-else class="bg-white rounded-3xl shadow-xl p-8 fade-in text-center">
        <div class="inline-block p-4 bg-blue-100 rounded-full mb-4">
            <svg class="w-12 h-12 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <h2 class="text-2xl font-bold text-slate-800 mb-4">测评报告</h2>
        <p class="text-lg text-slate-600 mb-6 leading-relaxed">{{ finalReport }}</p>
        <button @click="reset" class="px-8 py-3 bg-slate-800 text-white rounded-full hover:bg-slate-700 transition-all">重新测试</button>
    </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                currentIndex: 0,
                totalScore: 0,
                showResult: false,
                questions: [
    { text: "1. 我觉得自己是一个有价值的人，至少与其他人在同一水平上。" },
    { text: "2. 在公共场合讲话时，我会感到异常紧张或心跳加速。" },
    { text: "3. 我倾向于认为自己是一个失败者。" },
    { text: "4. 当我进入一个坐满人的房间时，我会感到大家都在注视我。" },
    { text: "5. 我能像大多数人一样，把事情做得一样好。" },
    { text: "6. 我常因担心自己说错话而选择在社交场合保持沉默。" },
    { text: "7. 我对自己持有一种肯定的态度。" },
    { text: "8. 即使在熟悉的人面前，我也很难自然地表达内心真实感受。" },
    { text: "9. 总的来说，我对自己是很满意的。" },
    { text: "10. 面对新的挑战时，我第一反应通常是“我不行”。" }
],
                options: [
                    { label: "非常符合", score: 5 },
                    { label: "比较符合", score: 4 },
                    { label: "一般", score: 3 },
                    { label: "不太符合", score: 2 },
                    { label: "完全不符合", score: 1 }
                ]
            }
        },
        computed: {
            currentQuestion() { return this.questions[this.currentIndex]; },
            progress() { return ((this.currentIndex + 1) / this.questions.length) * 100; },
            finalReport() {
                if (this.totalScore >= 22) return "您的心理韧性极佳，具备卓越的自我调节能力和情绪智力，能胜任高压工作。";
                if (this.totalScore >= 15) return "您的状态较为平衡，拥有健康的心理防御机制，建议定期进行心理放松。";
                return "当前您的心理能量较低，可能处于一段压力期。建议尝试减少任务负荷，并增加规律的运动。";
            }
        },
        methods: {
            selectOption(score) {
                this.totalScore += score;
                if (this.currentIndex < this.questions.length - 1) {
                    this.currentIndex++;
                } else {
                    this.showResult = true;
                }
            },
            reset() {
                this.currentIndex = 0;
                this.totalScore = 0;
                this.showResult = false;
            }
        }
    }).mount('#app')
</script>
</body>
</html>
